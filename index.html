<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <meta name="theme-color" content="#0d0a14" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <title>星光与画稿 V2 · 明星荟萃版</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@300;500;600&family=ZCOOL+XiaoWei&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/style.css" />
  <link rel="preload" href="assets/images/heroine-isapara-cutout.png" as="image" />
  <link rel="preload" href="assets/images/hero-xiaozhan-cutout.png" as="image" />
</head>
<body>
  <div id="app">
    <section id="screen-title" class="screen active">
      <div class="title-bg" id="title-bg-layer"></div>
      <div class="title-ambience" aria-hidden="true">
        <div class="title-rain"></div>
        <div class="title-glow"></div>
        <div class="title-vignette"></div>
      </div>

      <div class="title-stage" aria-hidden="true">
        <div class="title-sprites">
          <div class="sprite sprite-heroine title-sprite-in">
            <img src="assets/images/heroine-isapara-cutout.png" alt="" class="sprite-img" />
          </div>
          <div class="sprite sprite-hero title-sprite-in title-sprite-delay">
            <img src="assets/images/hero-xiaozhan-cutout.png" alt="" class="sprite-img sprite-img-hero" />
          </div>
        </div>
        <p class="title-scene-label">画室 · 雨夜 · 序章</p>
      </div>

      <div class="title-content">
        <header class="title-head">
          <p class="title-tag">原创互动剧 · 网页视觉小说</p>
          <div class="title-brand">
            <span class="title-v2-pill">V2</span>
            <span class="title-edition">明星荟萃 · 进阶篇</span>
          </div>
        </header>

        <nav class="title-progress" aria-label="剧情进阶">
          <div class="title-step done"><span class="dot"></span><span>画室启程</span></div>
          <div class="title-step done"><span class="dot"></span><span>圈内小聚</span></div>
          <div class="title-step active"><span class="dot"></span><span>雨夜抉择</span></div>
          <div class="title-step"><span class="dot"></span><span>轨迹展览</span></div>
        </nav>

        <div class="title-hero-block">
          <p class="title-verse">深夜画室，一笔未干。</p>
          <h1>星光与画稿</h1>
          <p class="title-sub">画家 isapara × 顶流 肖战</p>
          <div class="title-tags" aria-label="故事标签">
            <span>多路线</span><span>雨夜</span><span>闺蜜支线</span><span>多结局</span>
          </div>
          <p class="title-hook">匿名委托只要一场会下雨的夜——落款，却只有一个字母「Z」。</p>
        </div>

        <div class="title-teaser dialogue-box" aria-label="序章台词预览">
          <div class="name-plate"><span>isapara</span></div>
          <p class="title-teaser-text">最后一管钴蓝挤不出来时，房租催缴单在门上沙沙响。工作室只剩一盏画灯……</p>
          <p class="title-how">点击对话框继续 · 与游戏内界面一致</p>
        </div>

        <div class="title-actions">
          <button type="button" id="btn-start" class="btn-primary btn-title">从画室序章开始</button>
          <button type="button" id="btn-continue" class="btn-secondary btn-title-ghost hidden">继续旅程</button>
        </div>
      </div>
    </section>
    <section id="screen-game" class="screen">
      <header class="hud">
        <div class="chapter-badge"><span id="chapter-label">序章</span></div>
        <div class="stats-bar">
          <div class="stat"><span class="stat-icon">♥</span><span id="stat-affection">0</span></div>
          <div class="stat"><span class="stat-icon">✦</span><span id="stat-trust">0</span></div>
          <div class="stat"><span class="stat-icon">⚡</span><span id="stat-stress">0</span></div>
          <div class="stat"><span class="stat-icon">📰</span><span id="stat-rumor">0</span></div>
        </div>
      </header>
      <div class="game-stage">
        <div id="bg-layer" class="bg-layer"></div>
        <div class="vignette"></div>
        <div id="sprites" class="sprites">
          <div id="sprite-heroine" class="sprite sprite-heroine hidden"><img src="assets/images/heroine-isapara-cutout.png" alt="isapara" class="sprite-img" /></div>
          <div id="sprite-hero" class="sprite sprite-hero hidden"><img src="assets/images/hero-xiaozhan-cutout.png" alt="肖战" class="sprite-img sprite-img-hero" /></div>
          <div id="sprite-npc" class="sprite sprite-npc hidden"><img id="sprite-npc-img" src="assets/images/npc/npc-colleague-cutout.png" alt="路人" class="sprite-img" /></div>
        </div>
        <div id="chapter-card" class="chapter-card hidden"></div>
        <p id="game-hint" class="game-hint">点击对话框继续</p>
      </div>
      <div id="choices-panel" class="choices-panel hidden"></div>
      <div class="dialogue-box" id="dialogue-box">
        <div class="name-plate"><span id="speaker-name">isapara</span></div>
        <p id="dialogue-text" class="dialogue-text">请点击标题页的「从画室序章开始」</p>
        <button type="button" id="btn-next" class="btn-next">▼ 继续</button>
      </div>
    </section>
    <section id="screen-ending" class="screen">
      <div id="ending-bg" class="ending-bg"></div>
      <div class="ending-card">
        <h2 id="ending-title"></h2>
        <p id="ending-text"></p>
        <div class="ending-stats" id="ending-stats"></div>
        <button type="button" id="btn-restart" class="btn-primary">再玩一次</button>
      </div>
    </section>
  </div>
  <div id="load-error" class="load-error hidden"></div>
  <script src="js/assets.js"></script>
  <script src="js/story.js"></script>
  <script src="js/story-expand.js"></script>
  <script src="js/story-routes.js"></script>
  <script src="js/story-flow.js"></script>
  <script src="js/game.js"></script>
</body>
</html>
